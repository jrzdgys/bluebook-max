<!DOCTYPE html>
<!-- 蓝宝书Max Template Global v2.0 → 精确对齐v3头部 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
    <title>蓝宝书Max</title>
    <meta property="og:title" content="蓝宝书Max">
    <meta property="og:description" content="机构级投研情报">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="蓝宝书Max">
    <meta property="og:image" content="https://jrzdgys.github.io/bluebook-max/logo.png">
    <meta property="og:image:width" content="1000">
    <meta property="og:image:height" content="1000">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#E4E1DC;color:#1D1D1F;line-height:1.6;padding:24px}
.w{max-width:900px;margin:0 auto}

/* === 浮动栏（v3精确）=== */
.float-bar{position:sticky;top:0;z-index:101;height:40px;display:flex;align-items:center;padding:0 16px;background:#0071E3;border-bottom:1px solid rgba(255,255,255,.1);border-radius:16px 16px 0 0;transition:box-shadow .2s}
.float-bar .fb-left{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* === sh === */
.sh{background:#0071E3;color:#fff;padding:28px 28px 20px;border-radius:0}

/* === 会员提示行（v3精确）=== */
.member-notice{padding:6px 28px;font-size:12px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.06);text-align:center;letter-spacing:0.3px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.member-notice .mn-icon{font-size:11px;opacity:.7}
.member-notice .mn-text{color:rgba(255,255,255,.7)}
.member-notice .mn-dot{color:rgba(255,255,255,.3);font-size:8px}
.member-notice .mn-link{display:inline-flex;align-items:center;gap:4px;padding:2px 12px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:12px;text-decoration:none;white-space:nowrap;cursor:pointer;transition:all .2s}
.member-notice .mn-link:hover{background:rgba(255,255,255,.25)}

/* === h1 品牌（v3精确）=== */
.sh h1{font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;letter-spacing:-0.5px}
.sh h1 .brand-name{font-size:26px;font-weight:800;letter-spacing:-0.5px}
.sh h1 .brand-dot{font-size:20px;font-weight:300;opacity:.65;margin:0 2px}
.sh h1 .brand-slogan{font-size:20px;font-weight:800;opacity:1;letter-spacing:1.5px}

/* === info-row（v3精确）=== */
.info-row{display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;font-size:13px;color:rgba(255,255,255,.78)}
.info-row .info-right{color:rgba(255,255,255,.78)}
.info-row .info-left{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap}
.biz-wx{cursor:pointer;color:#fff;font-weight:700;font-size:14px;padding:2px 10px;border-radius:14px;background:rgba(255,255,255,.13);transition:all .2s;user-select:none;display:inline-flex;align-items:center;gap:4px}
.biz-wx:hover{background:rgba(255,255,255,.22)}
.biz-wx svg{width:14px;height:14px;flex-shrink:0}
.biz-copy-ok{display:none;color:#34C759;font-size:12px;margin-left:2px;font-weight:600}
.biz-copy-ok.show{display:inline}

/* === 统计卡片（v3样式适配3列）=== */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0}
.stats-row .st{text-align:center;min-width:72px;background:rgba(255,255,255,.08);padding:10px 16px;border-radius:10px;backdrop-filter:blur(4px)}
.stats-row .st strong{display:block;font-size:24px;font-weight:800;line-height:1.2}
.stats-row .st span{font-size:10px;color:rgba(255,255,255,.5)}

/* === 内容区 === */
.ct{background:#fff;padding:16px 20px 24px;border-radius:0 0 16px 16px;margin-bottom:0}
.sc{margin-bottom:16px}
.sc-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#0071E3;border-radius:10px;margin-bottom:10px}
.sc-icon{font-size:16px}
.sc-title{font-size:14px;font-weight:700;color:#fff;flex:1}
.sc-sub{font-size:11px;color:rgba(255,255,255,.65);font-weight:600}
.sc-body{padding:0 0 0 4px}
.news-card{border-left:3px solid #E5E5EA;padding:10px 14px;margin-bottom:12px;border-radius:0 8px 8px 0;transition:all .15s}
.news-card:hover{border-left-color:#0071E3;background:#F8F9FC}
.news-num{font-size:10px;color:#AEAEB2;font-weight:600;margin-bottom:2px}
.news-title{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.5}
.news-body{font-size:13px;color:#515154;line-height:1.7;margin-bottom:8px}
.stock-tags{display:flex;flex-wrap:wrap;gap:6px}
.stock-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#0071E3;background:rgba(0,113,227,.06);padding:3px 10px;border-radius:20px}
.stock-tag .note{font-size:11px;font-weight:400;color:#86868B}
.stock-tag .stock-ticker{font-weight:700;color:#0051A8}
.stock-tag .stock-ticker{font-weight:700;color:#0051A8}

/* === 底部（完全不动）=== */
.fo{padding:16px 20px 24px;text-align:center}
.fo .fo-line1{font-size:11px;color:#AEAEB2;margin-bottom:6px;line-height:1.5}
.fo .fo-line2{font-size:10px;color:#C7C7CC;margin-bottom:12px}
.fo .fo-line3{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;padding-top:10px;border-top:1px solid #EFEFF4;font-size:11px;color:#AEAEB2}
.fo .fo-line3 a{color:#0071E3;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:rgba(0,113,227,.06);transition:all .15s}
.fo .fo-line3 a:hover{background:rgba(0,113,227,.12);color:#005BB5}
.fo .fo-email{color:#AEAEB2}

/* === 响应式 === */
@media(max-width:640px){
.sh{padding:16px 14px 14px}
body{padding:12px}
.float-bar{height:36px;padding:0 12px}
.float-bar .fb-left{font-size:12px}
.sh h1{font-size:22px;flex-wrap:nowrap;gap:6px}
.sh h1 .brand-slogan{font-size:18px}
.member-notice{padding:5px 14px;font-size:12px;gap:4px}
.member-notice .mn-link{font-size:11px;padding:1px 10px}
.info-row{padding:0 0 10px;flex-wrap:wrap;gap:4px;font-size:12px;color:rgba(255,255,255,.78)}
.info-row .info-left{gap:3px}
.info-row .info-right{flex:0 0 100%;margin-left:0;text-align:left;font-size:10px;opacity:.6}
.ct{padding:12px 12px 18px}
.news-card{padding:12px 14px}
.news-title{font-size:14px}
.news-body{font-size:12px}
.stock-tag{font-size:11px;padding:2px 8px}
.stock-tag .note{font-size:10px}
.fo{padding:14px 10px}
.fo .fo-line1{font-size:10px}
.fo .fo-line2{font-size:9px}
.fo .fo-line3{gap:8px;flex-direction:column}
.fo .fo-line3 a{padding:6px 14px;font-size:10px;width:100%;justify-content:center}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0}
.stats-row .st{min-width:auto;padding:8px 6px;border-radius:8px}
.stats-row .st strong{font-size:20px}
.stats-row .st span{font-size:10px}
}
</style>
</head>
<body>
<div class="w">
<div class="float-bar" id="float-bar">
<span class="fb-left">
<span class="fb-brand">蓝宝书Max</span><span class="fb-sep"> · </span><span class="fb-info" id="fb-info"></span>
</span>
</div>
<div class="sh">
<div class="member-notice"><span class="mn-icon">🔒</span><span class="mn-text">本报告仅供付费会员查阅</span><span class="mn-dot">·</span><a href="https://t.zsxq.com/6iVvp" target="_blank" class="mn-link">新用户订阅 → 知识星球</a></div>
<h1><span class="brand-name">蓝宝书Max</span><span class="brand-dot">·</span><span class="brand-slogan">机构级投研情报</span></h1>
<div class="info-row">
<span class="info-left">
<span class="biz-wx" onclick="copyWx()" title="点击复制微信号"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8.5 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm7 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM12 2C6.48 2 2 6.48 2 12c0 1.82.5 3.53 1.36 5L2 22l5.36-1.36A9.96 9.96 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>商务微信 bluebookmax</span>
<span class="biz-copy-ok" id="gv-copy-ok">✓已复制</span>
</span>
<span class="info-right" id="update-time">更新于 · ...</span>
</div>
<div class="stats-row">
<div class="st"><strong id="stat-news">—</strong><span>全部新闻</span></div>
<div class="st"><strong id="stat-stocks">—</strong><span>涉及标的</span></div>
<div class="st"><strong id="stat-sections">—</strong><span>分类板块</span></div>
</div>
</div>
<div class="ct" id="content-area"></div>

<div class="fo-line1">⚠️所有内容仅供参考，不构成投资建议 · ❗️股市有风险，投资需谨慎。过往表现不预示未来收益</div>

<div class="fo-line3">
<a href="mailto:bluebookmax@gmail.com" class="fo-email">📧 bluebookmax@gmail.com</a>

</div>
</div>
</div>

<script id="global-data">
GD = null
</script>
<script>
(function(){
var g = GD;
if(!g) return;

// 浮动栏
document.getElementById("fb-info").textContent = g.edition.dateDisplay + " " + g.edition.weekday + " · " + g.edition.label;

// info-row
document.getElementById("update-time").textContent = "更新于 · " + g.edition.updateTime;

// 统计卡片
document.getElementById("stat-news").textContent = g.stats.newsCount;
document.getElementById("stat-stocks").textContent = g.stats.stockCount;
document.getElementById("stat-sections").textContent = g.stats.sectionCount;

// 页面标题
document.title = "蓝宝书Max · " + g.edition.dateDisplay + " " + g.edition.weekday + " " + g.edition.label;
document.querySelector('meta[property="og:title"]').setAttribute("content", document.title);
document.querySelector('meta[property="og:description"]').setAttribute("content", g.stats.newsCount + "条全球新闻 · " + g.stats.stockCount + "只相关标的");

// 浮动栏阴影
(function(){
var fb = document.getElementById("float-bar");
if(fb){window.addEventListener("scroll",function(){fb.style.boxShadow = window.scrollY > 10 ? "0 2px 12px rgba(0,0,0,.15)" : "none";})}
})();

// 渲染内容
var ca = document.getElementById("content-area");
var html = "";
g.sections.forEach(function(s){
  html += '<div class="sc"><div class="sc-hd"><span class="sc-icon">' + (s.icon || "") + '</span><span class="sc-title">' + s.name + '</span><span class="sc-sub">' + s.news.length + '条</span></div><div class="sc-body">';
  s.news.forEach(function(n){
    html += '<div class="news-card"><div class="news-num">#' + n.id + '</div><div class="news-title">' + n.title + '</div><div class="news-body">' + n.body + '</div>';
    if(n.stocks && n.stocks.length > 0){
      html += '<div class="stock-tags">';
      n.stocks.forEach(function(st){var dn=st.displayName||st.name;html += '<span class="stock-tag"><span class="stock-company">'+dn+'</span>(<span class="stock-ticker">'+st.name+'</span>)<span class="note"> · '+(st.note||'')+'</span></span>';});
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';
});
ca.innerHTML = html;
})();

function copyWx(){
navigator.clipboard.writeText('bluebookmax').then(function(){
var e = document.getElementById('gv-copy-ok');
if(e){e.classList.add('show');setTimeout(function(){e.classList.remove('show')},2000)}
}).catch(function(){});
return false;
}
</script>
</body>
</html>
