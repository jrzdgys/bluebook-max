      var groupsHtml = '';
      t.groups.forEach(function(g) {
        if (!g.items || g.items.length === 0) return;
        var lc = labelClasses[g.label] || 'l3';
        var rows = g.items.map(function(s) {
          var code = ED.secidMap[s.name] || '';
          var codeNum = code.replace(/^[01]\./, '');
          return '<div class="sr" data-stock="' + s.name + '" data-secid="' + code + '">' +
            '<span class="sn">' + s.name + '</span>' +
            '<span class="sc">' + codeNum + '</span>' +
            '<span class="sp' + (s.pct ? (s.pct >= 0 ? ' up' : ' dn') : '') + '">' + 
        (s.price ? s.price.toFixed(2) : '--') + '</span>' +
            '<span class="sr2" title="' + (s.reason || g.label) + '">' + (s.reason || g.label) + 
        (s.pct ? ' <span style=\"font-size:9px;color:' + (s.pct >= 0 ? '#C4433A' : '#34C759') + '\">' + (s.pct >= 0 ? '+' : '') + s.pct.toFixed(2) + '%</span>' : '') + '</span>' +
          '</div>';
        }).join('');
        groupsHtml += '<div class="sg"><div class="gl ' + lc + '">' + g.label + '</div>' + rows + '</div>';
      });

      var card = document.createElement('div');
      card.className = 'tc';
      card.innerHTML = 
        '<div class="tc-header">' +
          '<span class="tc-rank">TOP' + rank + '</span>' +
          '<span class="tc-name">' + t.topic + '</span>' +
          '<span class="tc-stage" style="background:' + bg + ';color:' + color + '">' + t.stage + '</span>' +
          '<div class="tc-heat-wrap">' +
            '<span class="tc-heat" style="color:' + color + '">' + t.heat + '</span>' +
            '<span class="tc-info" data-idx="' + i + '">\u24D8</span>' +
            '<div class="hp" id="popup-' + i + '">' +
              '<div class="hp-title">' + t.topic + ' · 热度构成</div>' +
              '<div class="hp-scores">机构关注度 ' + Math.round(t.heat*0.55) + ' | 市场确认度 ' + Math.round(t.heat*0.25) + ' | 催化质量 ' + Math.round(t.heat*0.20) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="tc-desc">' + t.summary + '</div>' +
        (t.quote ? '<div class="tc-quote">\uD83D\uDCD8 ' + t.quote + '</div>' : '') +
        groupsHtml;
      container.appendChild(card);
    });

    document.querySelectorAll('.tc-info').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = this.dataset.idx;
        var popup = document.getElementById('popup-' + idx);
        if (popup) popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
      });
    });
    document.addEventListener('click', function() {
      document.querySelectorAll('.hp').forEach(function(p) { p.style.display = 'none'; });
    });

    // ===== Quotes =====
    var TRADING = isTradingHours();
    var REFRESH_MS = TRADING ? 10000 : 60000;
    var API_URL = 'https://push2.eastmoney.com/api/qt/ulist.np/get';

    function updateLiveIndicator() {
      var dot = document.getElementById('live-dot');
      var txt = document.getElementById('live-text');
      if (isTradingHours()) {
        dot.className = 'live-dot live';
        txt.textContent = '实时行情 · ' + timeStr();
      } else {
        dot.className = 'live-dot closed';
        txt.textContent = '收盘价 · ' + timeStr();
      }
    }

    async function fetchQuotes() {
      var allSecids = []; 
      var seen = {};
      Object.values(ED.secidMap).forEach(function(s) { if (!seen[s]) { seen[s]=1; allSecids.push(s); } });
      if (allSecids.length === 0) return;

      try {
        var url = API_URL + '?fltt=2&invt=2&fields=f2,f3,f12,f14&secids=' + allSecids.join(',') + '&_=' + Date.now();
        var resp = await fetch(url);
        var json = await resp.json();
        if (!json.data || !json.data.diff) return;

        var priceMap = {};
        json.data.diff.forEach(function(d) { priceMap[d.f12] = { pct: d.f3, price: d.f2 }; });

        document.querySelectorAll('.sr[data-secid]').forEach(function(row) {
          var secid = row.dataset.secid;
          var d = priceMap[secid];
          var pctEl = row.querySelector('[data-field="pct"]');
          if (d && pctEl) {
            if (isTradingHours()) {
              var pct = d.pct;
              if (pct != null && !isNaN(pct) && pct !== 0) {
                var v = parseFloat(pct);
                pctEl.className = 'sp ' + (v >= 0 ? 'up' : 'dn');
                pctEl.textContent = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
              }
            } else {
              // After hours: show closing price
              if (d.price && d.price !== 0) {
                pctEl.className = 'sp';
                pctEl.textContent = parseFloat(d.price).toFixed(2);
              }
            }
          }
        });

        updateLiveIndicator();
        document.getElementById('footer-time').textContent = timeStr();
      } catch(e) {}
    }

    updateLiveIndicator();
    fetchQuotes();
    setInterval(fetchQuotes, REFRESH_MS);
    setInterval(function() { updateLiveIndicator(); }, 60000);
    </script>
    </body>
    </html>
