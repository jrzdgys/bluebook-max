    <script>
    // ===== Read edition data =====
    const ED = JSON.parse(document.getElementById('edition-data').textContent);

    // ===== Update page chrome =====
    document.title = `蓝宝书Max · ${ED.edition.dateDisplay} ${ED.edition.label}`;
    document.getElementById('edition-subtitle').textContent = 
      `⚡ 蓝宝书Max · ${ED.edition.dateDisplay} ${ED.edition.label}`;
    document.getElementById('edition-badge').textContent = 
      ED.edition.type === 'global' ? '全球版 🌏' : '国内版 🧡';
    document.getElementById('stat-topics').textContent = ED.stats.topics;
    document.getElementById('stat-opp').textContent = ED.stats.opportunities;
    document.getElementById('stat-stocks').textContent = ED.stats.stocks;
    document.getElementById('market-summary').textContent = 
      '📌 ' + ED.marketSummary;
    document.getElementById('topics-header').textContent = 
      `🔥 全部主题（${ED.stats.topics}个）`;

    // ===== Render topic cards =====
    const container = document.getElementById('topics-container');

    function heatColor(heat) {
      if (heat >= 85) return '#C4433A';
      if (heat >= 70) return '#E67E22';
      if (heat >= 55) return '#2E86C1';
      return '#7D8B8F';
    }

    function stageBg(heat) {
      if (heat >= 85) return '#C4433A15';
      if (heat >= 70) return '#E67E2215';
      if (heat >= 55) return '#2E86C115';
      return '#7D8B8F15';
    }

    function formatPrice(pct) {
      if (pct == null || isNaN(pct)) return '--';
      const v = parseFloat(pct);
      const cls = v >= 0 ? 'up' : 'dn';
      const sign = v >= 0 ? '+' : '';
      return `<span class="sp ${cls}">${sign}${v.toFixed(2)}%</span>`;
    }

    ED.topics.forEach((t, i) => {
      const rank = i + 1;
      const color = heatColor(t.heat);
      const bg = stageBg(t.heat);

      let groupsHtml = '';
      const labelClasses = {'龙头首选':'l1','弹性机会':'l2','相关标的':'l3'};

      t.groups.forEach(g => {
        if (!g.items || g.items.length === 0) return;
        const lc = labelClasses[g.label] || 'l3';
        let rows = g.items.map(s => {
          const code = ED.secidMap[s.name] || '';
          const codeNum = code.replace(/^[01]\./, '');
          return `<div class="sr" data-stock="${s.name}" data-secid="${code}">
            <span class="sn">${s.name}</span>
            <span class="sc">${codeNum}</span>
            <span class="sp" data-field="pct">--</span>
            <span class="sr2">${s.reason || g.label}</span>
          </div>`;
        }).join('');
        groupsHtml += `<div class="sg"><div class="gl ${lc}">${g.label}</div>${rows}</div>`;
      });

      const card = document.createElement('div');
      card.className = 'tc';
      card.innerHTML = `
        <div class="th">
          <span class="rank">TOP${rank}</span>
          <span class="tn">${t.topic}</span>
          <span class="stage" style="background:${bg};color:${color}">${t.stage}</span>
          <span class="heat" style="color:${color}">${t.heat}</span>
          <span class="hib" data-idx="${i}">ⓘ</span>
          <div class="hp" id="popup-${i}">
            <div class="hp-title">${t.topic} · 热度指数构成</div>
            <div class="hp-scores">机构关注度 ${Math.round(t.heat*0.55)} | 市场确认度 ${Math.round(t.heat*0.25)} | 催化质量 ${Math.round(t.heat*0.20)}</div>
          </div>
        </div>
        <div class="ts">${t.summary}</div>
        ${t.quote ? `<div class="tq">📘 ${t.quote}</div>` : ''}
        ${groupsHtml}
      `;
      container.appendChild(card);
    });

    // ===== Heat popup toggle =====
    document.querySelectorAll('.hib').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const idx = this.dataset.idx;
        const popup = document.getElementById('popup-' + idx);
        if (popup) {
          popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
        }
      });
    });
    document.addEventListener('click', () => {
      document.querySelectorAll('.hp').forEach(p => p.style.display = 'none');
    });

    // ===== Real-time quotes via Eastmoney =====
    const REFRESH_INTERVAL = 10000;
    const API_URL = 'https://push2.eastmoney.com/api/qt/ulist.np/get';

    async function refreshQuotes() {
      const allSecids = [...new Set(Object.values(ED.secidMap))];
      if (allSecids.length === 0) return;

      try {
        const fields = 'f2,f3,f12,f14';
        const secids = allSecids.join(',');
        const url = `${API_URL}?fltt=2&invt=2&fields=${fields}&secids=${secids}&_=${Date.now()}`;
        const resp = await fetch(url);
        const json = await resp.json();

        if (!json.data || !json.data.diff) return;

        const diffList = json.data.diff;
        const priceMap = {};
        diffList.forEach(d => {
          priceMap[d.f12] = { name: d.f14, price: d.f2, pct: d.f3 };
        });

        // Update all stock rows
        document.querySelectorAll('.sr[data-secid]').forEach(row => {
          const secid = row.dataset.secid;
          const data = priceMap[secid];
          const pctEl = row.querySelector('[data-field="pct"]');
          if (data && pctEl) {
            const pct = data.pct;
            if (pct != null && !isNaN(pct)) {
              const v = parseFloat(pct);
              const cls = v >= 0 ? 'up' : 'dn';
              const sign = v >= 0 ? '+' : '';
              pctEl.className = `sp ${cls}`;
              pctEl.textContent = `${sign}${v.toFixed(2)}%`;
            }
          }
        });

        document.getElementById('live-text').textContent = '实时行情';
        document.querySelector('.live .dot').style.background = '#34C759';
      } catch(e) {
        document.getElementById('live-text').textContent = '行情刷新中...';
      }
    }

    // Initial load and polling
    refreshQuotes();
    setInterval(refreshQuotes, REFRESH_INTERVAL);
    </script>
