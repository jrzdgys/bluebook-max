    document.addEventListener('click',function(e){if(!PE.contains(e.target))hp()});
    window.addEventListener('scroll',function(){if(OP!=null)hp()},{passive:true});
    window.addEventListener('resize',function(){if(OP!=null)hp()},{passive:true});
    var TD=isTH(),RI=TD?15000:60000;
    function uli(){var d=document.getElementById('live-dot'),t=document.getElementById('live-text');if(isTH()){d.className='live-dot live';t.textContent='实时行情 · '+ts()}else{d.className='live-dot closed';t.textContent='收盘价 · '+ts()}}
    async function fq(){var as=[],sn={};Object.values(ED.secidMap).forEach(function(s){if(!sn[s]){sn[s]=1;as.push(s)}});if(!as.length)return;try{var u='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f12,f14&secids='+as.join(',')+'&_='+Date.now();var r=await fetch(u);var j=await r.json();if(!j.data||!j.data.diff)return;var pm={};j.data.diff.forEach(function(d){pm[d.f12]={pct:d.f3,price:d.f2}});document.querySelectorAll('.sr[data-secid]').forEach(function(row){var si=row.dataset.secid;var d=pm[si];var spEl=row.querySelector('.sp');var sppEl=row.querySelector('.spp');if(d){if(!isTH()&&d.price&&d.price!==0){spEl.textContent=parseFloat(d.price).toFixed(2)}if(d.pct!=null){var v=parseFloat(d.pct);var cls=v>=0?' up':' dn';spEl.className='sp'+cls;sppEl.className='spp'+cls;sppEl.textContent=(v>=0?'+':'')+v.toFixed(2)+'%'}}});uli();document.getElementById('footer-time').textContent=ts()}catch(e){}}
    uli();fq();setInterval(fq,RI);setInterval(function(){uli()},60000);
    </script>
    </body>
