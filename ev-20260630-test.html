if(t.isOpportunity)return;var c=ht(t.heat),b=sb(t.heat);var gh="";if(t.stocks&&t.stocks.length){gh=t.stocks.map(function(s){var cd=ED.secidMap[s.name]||"",cn=cd.replace(/^[01]\./,""),pd=(cd&&(cd.startsWith('0.')||cd.startsWith('1.'))&&!isNaN(+(s.price)))?(+s.price).toFixed(2):"--",pD=(s.pct!=null)?(!isNaN(+(s.pct))?((+s.pct>=0?"+":"")+(+s.pct).toFixed(2)+"%"):""):"",pC=(s.pct!=null)?(s.pct>=0?" up":" dn"):"",pct=s.pct||0,bC=pct>=0?"up":"dn";return '<div class="sr" data-stock="'+s.name+'" data-secid="'+(cd&&(cd.startsWith('0.')||cd.startsWith('1.'))?cd:'')+'">'+(cd&&(cd.startsWith('0.')||cd.startsWith('1.'))?'<span class="pct-bar-outer"><span class="pct-bar '+bC+'"></span></span>':'')+'<span class="sn">'+s.name+'</span>'+(cd&&(cd.startsWith('0.')||cd.startsWith('1.'))?'<span class="sc">'+cn+'</span><span class="sp'+pC+'">'+pd+'</span><span class="spp'+pC+'">'+pD+'</span>':'')+'<span class="sr2" title="'+(s.reason||"")+'">'+(s.reason||"")+'</span></div>'}).join("")}var cd=document.createElement("div");cd.className="tc";cd.id="topic-"+i;var qh="";if(t.summary){qh='<div class="tc-quote">📘 '+t.summary+"</div>"}cd.innerHTML='<div class="tc-header"><span class="tc-rank">TOP'+(i+1)+'</span><span class="tc-name">'+t.topic+'</span><span class="tc-stage" style="background:'+b+";color:"+c+'">'+sl(t.heat)+'</span><div class="tc-heat-wrap"><span class="tc-heat" style="color:'+c+'" data-idx="'+i+'">'+t.heat+'</span><span class="tc-info" data-idx="'+i+'">i</span></div></div>'+qh+gh;C.appendChild(cd)});
