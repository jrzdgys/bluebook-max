<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓝宝书Max · 激活码管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 20px; }
.container { max-width: 960px; margin: 0 auto; }
h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
input, select { height: 36px; border: 1px solid #d2d2d7; border-radius: 8px; padding: 0 12px; font-size: 14px; flex: 1; min-width: 200px; }
input:focus { outline: none; border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
.btn { height: 36px; padding: 0 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary { background: #0071e3; color: #fff; }
.btn-primary:hover { background: #0066d6; }
.btn-danger { background: #ff3b30; color: #fff; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-outline { background: transparent; border: 1px solid #d2d2d7; }
.btn-outline:hover { background: #f5f5f7; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 10px 8px; border-bottom: 2px solid #e8e8ed; font-weight: 600; color: #6e6e73; font-size: 12px; text-transform: uppercase; }
td { padding: 10px 8px; border-bottom: 1px solid #e8e8ed; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-green { background: #e8f5e9; color: #2e7d32; }
.badge-gray { background: #f0f0f0; color: #666; }
.badge-red { background: #fce4ec; color: #c62828; }
.key-input { font-family: 'SF Mono', monospace; font-size: 13px; }
.msg { padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 8px; display: none; white-space: pre-wrap; }
.msg-success { background: #e8f5e9; color: #2e7d32; display: block; }
.msg-error { background: #fce4ec; color: #c62828; display: block; }
.codes-output { background: #f5f5f7; border-radius: 8px; padding: 12px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.8; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🔑 蓝宝书Max · 激活码管理</h1>

  <div class="card">
    <div class="row">
      <input type="password" id="adminKey" placeholder="管理员密钥 (ADMIN_KEY)" class="key-input" style="max-width:300px">
      <button class="btn btn-primary" onclick="loadCodes()">📋 加载列表</button>
      <button class="btn btn-outline" onclick="showGenerate()">➕ 生成新码</button>
      <span id="statusText" style="color:#86868b;font-size:13px"></span>
    </div>
  </div>

  <div class="card" id="generateCard" style="display:none">
    <div class="row">
      <span>生成</span>
      <input type="number" id="newCount" value="5" min="1" max="50" style="width:70px;flex:none">
      <span>个，有效期</span>
      <input type="number" id="newDays" value="365" min="1" max="3650" style="width:70px;flex:none">
      <span>天</span>
      <button class="btn btn-primary btn-sm" onclick="generateCodes()">✅ 确认生成</button>
      <button class="btn btn-outline btn-sm" onclick="hideGenerate()">取消</button>
    </div>
    <div id="codesOutput" class="codes-output"></div>
  </div>

  <div id="msg" class="msg"></div>

  <div class="card">
    <div id="loading" style="text-align:center;padding:40px;color:#86868b;display:none">⏳ 加载中...</div>
    <div id="tableWrap" style="display:none">
      <div style="margin-bottom:12px;color:#6e6e73;font-size:13px">
        共 <span id="totalCount">0</span> 个激活码
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>激活码</th>
              <th>状态</th>
              <th>设备</th>
              <th>有效期至</th>
              <th>创建于</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="codeTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://bluebook-auth.bluebookmax.workers.dev';

function msg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg msg-' + type;
}
function clearMsg() {
  document.getElementById('msg').className = 'msg';
}

async function api(path, data) {
  const r = await fetch(WORKER + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

function getAdminKey() {
  const k = document.getElementById('adminKey').value.trim();
  if (!k) { msg('请先输入管理员密钥', 'error'); return null; }
  localStorage.setItem('bbm_admin_key', k);
  return k;
}

function showGenerate() {
  document.getElementById('generateCard').style.display = 'block';
  document.getElementById('codesOutput').style.display = 'none';
}
function hideGenerate() {
  document.getElementById('generateCard').style.display = 'none';
}

async function loadCodes() {
  const admin_key = getAdminKey();
  if (!admin_key) return;

  clearMsg();
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('statusText').textContent = '加载中...';

  const data = await api('/list', { admin_key });
  document.getElementById('loading').style.display = 'none';
  document.getElementById('statusText').textContent = '';

  if (!data.ok) {
    msg('❌ ' + (data.error || '加载失败'), 'error');
    return;
  }

  const codes = data.codes || [];
  document.getElementById('totalCount').textContent = codes.length;
  document.getElementById('tableWrap').style.display = 'block';

  const tbody = document.getElementById('codeTable');
  const now = new Date();
  tbody.innerHTML = codes.map(c => {
    const used = c.used || c.devices > 0;
    const expires = new Date(c.expiresAt);
    const expired = expires < now;
    const status = expired ? '<span class="badge badge-red">已过期</span>' :
                   used ? '<span class="badge badge-green">已使用</span>' :
                          '<span class="badge badge-gray">未使用</span>';
    return '<tr>' +
      '<td class="key-input" style="font-weight:500">' + c.code + '</td>' +
      '<td>' + status + '</td>' +
      '<td>' + c.devices + '/' + c.maxDevices + '</td>' +
      '<td>' + expires.toISOString().slice(0,10) + '</td>' +
      '<td style="color:#86868b;font-size:12px">' + (c.createdAt ? new Date(c.createdAt).toISOString().slice(0,10) : '-') + '</td>' +
      '<td>' + (c.devices > 0 ? '<button class="btn btn-danger btn-sm" onclick="unbindAll(\'' + c.code + '\')">解绑</button>' : '-') + '</td>' +
      '</tr>';
  }).join('');

  if (codes.length === 0) {
    msg('暂无激活码，点击"生成新码"创建', 'success');
  }
}

async function unbindAll(code) {
  const admin_key = getAdminKey();
  if (!admin_key || !confirm('确定解绑 ' + code + ' 的所有设备？')) return;
  const data = await api('/unbind', { admin_key, code });
  if (data.ok) {
    msg('✅ 解绑成功！剩余设备位: ' + data.devicesLeft, 'success');
    loadCodes();
  } else {
    msg('❌ ' + (data.error || '解绑失败'), 'error');
  }
}

async function generateCodes() {
  const admin_key = getAdminKey();
  if (!admin_key) return;

  const count = parseInt(document.getElementById('newCount').value) || 5;
  const days = parseInt(document.getElementById('newDays').value) || 365;

  // Generate unique codes locally
  const codes = [];
  while (codes.length < count) {
    const rand = Array.from({length:4}, () => Math.floor(Math.random()*16).toString(16).toUpperCase()).join('');
    const code = 'BBM-' + rand;
    if (!codes.includes(code)) codes.push(code);
  }

  // Send to worker to inject into KV
  const data = await api('/codes/create', { admin_key, codes, days });
  if (data.ok) {
    const expires = new Date(data.expiresAt).toISOString().slice(0,10);
    const output = document.getElementById('codesOutput');
    output.innerHTML = '✅ 成功生成 ' + data.created + ' 个激活码\n' +
      '有效期至: ' + expires + '\n\n' +
      codes.map(c => '  ' + c).join('\n');
    output.style.display = 'block';
    msg('✅ 已生成 ' + data.created + ' 个激活码！', 'success');
    loadCodes();
  } else {
    msg('❌ ' + (data.error || '生成失败'), 'error');
  }
}

// Auto-load if key saved
const savedKey = localStorage.getItem('bbm_admin_key');
if (savedKey) {
  document.getElementById('adminKey').value = savedKey;
  loadCodes();
}
</script>
</body>
</html>
