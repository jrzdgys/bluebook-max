    <script>
    var ED=JSON.parse(document.getElementById('edition-data').textContent);
    var SECID_MAP=JSON.parse(document.getElementById('secid-map-data').textContent);
    function ht(h){if(h>=85)return'#C4433A';if(h>=65)return'#E67E22';if(h>=50)return'#2E86C1';return'#7D8B8F'}
    function sb(h){if(h>=85)return'#C4433A15';if(h>=65)return'#E67E2215';if(h>=50)return'#2E86C115';return'#7D8B8F15'}
    function isTH(){var n=new Date();var c=new Date(n.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));var d=c.getDay();var h=c.getHours(),m=c.getMinutes(),t=h*60+m;if(d===0||d===6)return false;return(t>=570&&t<900)}
    function ts(){var n=new Date();return n.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',second:'2-digit'})}
    document.title='蓝宝书Max · '+ED.edition.dateDisplay+' '+ED.edition.label;
    document.getElementById('header-date').textContent=ED.edition.dateDisplay;
    var ec=ED.edition.type;var ebg=ec==='mc'?'rgba(255,149,0,.15)':ec==='pm'?'rgba(0,113,227,.15)':ec==='ev'?'rgba(175,82,222,.15)':'rgba(48,180,110,.15)';var ecr=ec==='mc'?'#FF9500':ec==='pm'?'#0071E3':ec==='ev'?'#AF52DE':'#30B46E';var ei=ec==='mc'?'🌅':ec==='pm'?'☀️':ec==='ev'?'🌙':'🌍';var hde=document.getElementById('header-edition');hde.textContent=ei+' '+ED.edition.label;hde.style.background=ebg;hde.style.color=ecr;
    document.getElementById('stat-topics').textContent=ED.stats.topics;
    document.getElementById('stat-avgheat').textContent=ED.stats.avgHeat;
    document.getElementById('stat-stocks').textContent=ED.stats.stocks;
    document.getElementById('market-summary').textContent='📌 '+ED.marketSummary;
    document.getElementById('topics-header').textContent='🔥 市场热点（'+ED.stats.topics+'个）· 按综合热度降序';
    var _ut=ED.edition.updateTime||'';var _tp=_ut.split(' ');document.getElementById('update-time').textContent='更新于 '+ED.edition.dateDisplay+' '+(_tp[1]||'');
    var C=document.getElementById('topics-container'),OP=null,LC={'龙头首选':'l1','弹性机会':'l2','相关标的':'l3'};
    ED.topics.forEach(function(t,i){var r=i+1,c=ht(t.heat),b=sb(t.heat);var sc=t.scores||{};var gh='';
    t.groups.forEach(function(g){if(!g.items||!g.items.length)return;var lc=LC[g.label]||'l3';
    var rows=g.items.map(function(s){var cd=SECID_MAP[s.name]||'';var cn=cd.replace(/^[01]\./,'');var pd=(s.price!=null)?s.price.toFixed(2):'--';var pctD=(s.pct!=null)?((s.pct>=0?'+':'')+s.pct.toFixed(2)+'%'):'';var pctC=(s.pct!=null)?(s.pct>=0?' up':' dn'):'';
    return'<div class="sr" data-stock="'+s.name+'" data-secid="'+cd+'"><span class="sn">'+s.name+'</span><span class="sc">'+cn+'</span><span class="sp'+pctC+'">'+pd+'</span><span class="spp'+pctC+'">'+pctD+'</span><span class="sr2" title="'+(s.reason||g.label)+'">'+(s.reason||g.label)+'</span></div>'}).join('');
    gh+='<div class="sg"><div class="gl '+lc+'">'+g.label+'</div>'+rows+'</div>'});
    var card=document.createElement('div');card.className='tc';card.innerHTML='<div class="tc-header"><span class="tc-rank">TOP'+r+'</span><span class="tc-name">'+t.topic+'</span><span class="tc-stage" style="background:'+b+';color:'+c+'">'+t.stage+'</span><div class="tc-heat-wrap"><span class="tc-heat" style="color:'+c+'" data-idx="'+i+'">'+t.heat+'</span><span class="tc-info" data-idx="'+i+'">ⓘ</span></div></div><div class="tc-desc">'+t.summary+'</div>'+(t.quote?'<div class="tc-quote">📘 '+t.quote+'</div>':'')+gh;C.appendChild(card)});
    var PE=document.createElement('div');PE.className='hp';PE.id='spu';document.body.appendChild(PE);
    function sp(idx,ae){var t=ED.topics[idx];if(!t)return;var sc=t.scores||{};var ins=sc.inst||Math.round(t.heat*0.55);var mk=sc.market||Math.round(t.heat*0.25);var ct=sc.catalyst||Math.round(t.heat*0.20);PE.innerHTML='<div class="hp-title">'+t.topic+' · 热度构成</div><div class="hp-scores"><div class="hp-line"><span class="hl">机构关注度</span><span class="hv">'+ins+'/60</span></div><div class="hp-line"><span class="hl">市场确认度</span><span class="hv">'+mk+'/25</span></div><div class="hp-line"><span class="hl">催化强度</span><span class="hv">'+ct+'/15</span></div><div class="hp-line" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.15)"><span class="hl">综合热度</span><span class="hv" style="color:'+ht(t.heat)+'">'+t.heat+'/100</span></div></div>';var card=ae.closest('.tc');if(card){card.style.position='relative';card.style.overflow='visible';card.appendChild(PE)};var re=ae.getBoundingClientRect();var cr=card.getBoundingClientRect();var pw=Math.min(280,card.offsetWidth-20);PE.style.position='absolute';PE.style.width=pw+'px';PE.style.maxWidth='none';PE.style.top=(re.bottom-cr.top+6)+'px';PE.style.left='auto';PE.style.right=(cr.right-re.right)+'px';PE.style.boxShadow='0 6px 20px rgba(0,0,0,.18)';PE.style.zIndex='100';PE.style.borderRadius='10px';PE.style.whiteSpace='normal';PE.style.margin='0';PE.style.display='block';OP=idx}
    function hp(){PE.style.display='none';OP=null;if(PE.parentNode!=document.body)document.body.appendChild(PE)}
    document.querySelectorAll('.tc-info').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var idx=parseInt(this.dataset.idx);if(OP===idx){hp()}else{sp(idx,this)}})});
    document.addEventListener('click',function(e){if(!PE.contains(e.target))hp()});
    window.addEventListener('scroll',function(){if(OP!=null)hp()},{passive:true});
    window.addEventListener('resize',function(){if(OP!=null)hp()},{passive:true});
    async function fq(){var as=[],sn={};Object.values(SECID_MAP).forEach(function(s){if(!sn[s]){sn[s]=1;as.push(s)}});if(!as.length)return;try{var u='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f12,f14,f18&secids='+as.join(',')+'&_='+Date.now();var r=await fetch(u);var j=await r.json();if(!j.data||!j.data.diff)return;var pm={};j.data.diff.forEach(function(d){pm[d.f12]={pct:d.f3,price:d.f2,close:d.f18}});document.querySelectorAll('.sr[data-secid]').forEach(function(row){var si=row.dataset.secid;var sc=si.split('.')[1];var d=pm[sc]||pm[si];var spEl=row.querySelector('.sp');var sppEl=row.querySelector('.spp');if(d){var p=parseFloat(d.price);if(!isNaN(p)&&p!==0){spEl.textContent=p.toFixed(2)}else if(d.close){spEl.textContent=parseFloat(d.close).toFixed(2)}if(d.pct!=null){var v=parseFloat(d.pct);if(!isNaN(v)){var cls=v>=0?' up':' dn';spEl.className='sp'+cls;sppEl.className='spp'+cls;sppEl.textContent=(v>=0?'+':'')+v.toFixed(2)+'%'}}}});document.getElementById('footer-time').textContent=ts();var d2=document.getElementById('live-dot');var t2=document.getElementById('live-text');if(d2&&t2){if(isTH()){d2.className='live-dot live';t2.textContent='盘中 · '+ts()}else{d2.className='live-dot closed';t2.textContent='盘后 · '+ts()}}}catch(e){}}
    fq();setInterval(fq,15000);
    </script>
