    html += '<div class="news-card"><div class="news-num">#' + n.id + '</div><div class="news-title">' + n.title + '</div><div class="news-body">' + n.body + '</div>';
    if(n.stocks && n.stocks.length > 0){
      html += '<div class="stock-tags">';
      n.stocks.forEach(function(st){html += '<span class="stock-tag">' + st.name + '<span class="note">' + st.note + '</span></span>';});
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';
});
ca.innerHTML = html;
})();

function copyWx(){
navigator.clipboard.writeText('bluebookmax').then(function(){
var e = document.getElementById('gv-copy-ok');
if(e){e.classList.add('show');setTimeout(function(){e.classList.remove('show')},2000)}
}).catch(function(){});
return false;
}
</script>
