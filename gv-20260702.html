<script id="global-data">GD = {"edition": {"type": "gv", "label": "全球版", "date": "2026-07-02", "dateDisplay": "2026年7月2日", "weekday": "周四", "updateTime": "2026-07-02 08:03"}, "stats": {"newsCount": 20, "stockCount": 18, "sectionCount": 2}, "sections": [{"name": "隔夜美股复盘", "icon": "🌍", "news": [{"body": "隔夜美股市场表现分化，走势震荡。道指盘中创下历史新高，但收盘时与标普500指数基本持平，而以科技股为主的纳斯达克指数则收低。市场主要受到两大对冲力量影响：一方面，Meta(+8%) 宣布计划进军云计算业务，出售闲置AI算力，股价大幅上涨，提振了部分市场情绪；另一方面，半导体板块遭遇广泛抛售，拖累了科技股整体表现。宏观方面，美国6月ISM制造业指数从近四年高位回落至53.3，但仍处于扩张区间，其中价格支付指数创下近两年来最大单月降幅，缓解了部分通胀担忧。美联储主席沃什在欧洲央行论坛上表示通胀风险有所下降，但重申了抗通胀决心并拒绝提供前瞻指引，其言论对市场影响复杂。", "id": 1, "stocks": [], "title": "市场整体"}, {"body": "Meta Platforms(META) 股价在公司计划建立云计算业务以出售闲置AI计算能力的消息传出后大幅上涨。此举被视为Meta对其昂贵AI投资进行变现的尝试，旨在开辟新的收入来源。该消息在AI基础设施领域引发“蝴蝶效应”，直接竞争对手如CoreWeave和Nebius(NBIS) 的股价因此承压下跌。", "id": 2, "stocks": [], "title": "Meta进军云计算引发市场震动，股价大涨"}, {"body": "在科技股内部轮动和获利了结的压力下，半导体板块隔夜遭遇重挫。AMD(AMD)、SanDisk(SNDK) 和 Taiwan Semiconductor(TSM)(-6%) 等芯片股普遍下跌。此外，Super Micro Computer(SMCI) 因其台湾员工卷入英伟达芯片走私调查的消息而股价走低。整个AI硬件相关的股票，如Oracle(ORCL)，也经历了自1990年以来最差的单月表现，反映出市场对AI资本支出过热的担忧情绪加剧。", "id": 3, "stocks": [], "title": "半导体板块集体回调，AI硬件股普遍承压"}, {"body": "消费品和工业领域公司表现各异。General Mills(GIS) 因季度业绩超出预期，股价上涨9%。Constellation Brands(STZ) 在公布强劲的第一季度财报并上调2027财年指引后，股价走高。然而，Nike(NKE) 因对销售复苏乏力的持续担忧，股价跌至52周新低。工业分销商MSC Industrial(MSM) 在公布超预期的第三季度财报后，股价创下52周新高。", "id": 4, "stocks": [], "title": "消费与工业品公司财报及动态分化"}, {"body": "部分软件和服务公司股价表现强劲。Salesforce(CRM)(+4%) 在获得Guggenheim的看涨评级后股价大涨，分析师认为其前期抛售过度。ServiceNow(NOW) 因与埃森哲合作推出AI服务以及获得Guggenheim上调评级而上涨。Datadog(DDOG) 在宣布收购强化学习初创公司Adaptive ML以加速AI研发后，股价走高。", "id": 5, "stocks": [], "title": "软件与服务板块表现亮眼，Salesforce领涨"}, {"body": "美股IPO市场热度不减。拥有Vimeo和AOL的意大利科技公司Bending Spoons(SPOO) 在其美国市场首次亮相时股价飙升39%，此前其IPO定价已高于目标区间，成功募资16.8亿美元。此外，由Uber支持的电动滑板车运营商Lime(LIME) 在纳斯达克上市首日股价上涨4%，估值达到约17亿美元。", "id": 6, "stocks": [], "title": "IPO市场保持活跃，Bending Spoons上市首日大涨"}, {"body": "部分高波动性股票隔夜表现突出。二手车零售商Carvana(CVNA) 在宣布第二季度财报日期并预计零售单位和EBITDA将创纪录后，股价飙升。房地产科技公司Opendoor Technologies( 商的商业模式构成长期挑战。", "id": 5, "stocks": [{"displayName": "Sony", "name": "SONY", "note": "有望通过降低分销成本和强化数字商店生态来提升利润率"}, {"displayName": "Electronic Arts", "name": "EA", "note": ""}, {"displayName": "Take-Two Interactive", "name": "TTWO", "note": "作为大型发行商，将加速向纯数字分销转型"}], "title": "索尼宣布2028年起停止生产PlayStation实体光盘"}, {"body": "尽管美国整体劳动力市场保持稳定，但数据显示，人工智能（AI）的渗透已对特定行业产生显著的就业冲击。2026年，AI应用最广泛的科技和金融两大行业平均每月裁员2.8万人，成为拖累整体就业增长的一个因素。这一现象表明，企业在为AI投入巨额资本后，正通过裁员和缩减招聘来控制成本，尤其是行政和办公辅助类岗位面临的风险最大。这揭示了AI在宏观层面提升生产力的同时，也在微观层面引发了结构性的劳动力市场置换。", "id": 6, "stocks": [{"displayName": "ServiceNow", "name": "NOW", "note": "提供企业自动化工作流程软件，帮助企业提高效率"}, {"displayName": "Accenture", "name": "ACN", "note": "作为IT咨询公司，帮助企业实施AI转型，但自身也面临业务模式重塑"}], "title": "美国科技与金融业因AI每月裁员约2.8万人"}, {"body": "美国商务部解除了对AI初创公司Anthropic旗下先进模型（包括Fable 5和Mythos 5）的出口管制，此前这些模型因国家安全担忧被暂停向海外用户提供。Anthropic通过承诺加强网络安全防护并与政府合作制定未来模型标准，成功解决了监管机构的顾虑。此次解禁被视为美国政府在探索前沿AI技术监管路径上的一个重要案例，缓解了业界对AI出口管制可能扼杀创新的担忧。目前，功能更强大的Fable 5模型已在全球范围内对合作伙伴重新开放。", "id": 7, "stocks": [{"displayName": "Amazon", "name": "AMZN", "note": ""}, {"displayName": "Google", "name": "GOOGL", "note": "作为Anthropic的主要云合作伙伴和投资者，将受益于其模型在全球范围内的推广和应用"}], "title": "美国政府解除对Anthropic公司AI模型的出口限制"}, {"body": "由阿布扎比政府支持的投资公司MGX宣布，其首只专注于人工智能的基金已成功募资490亿美元，超过原定目标，成为有史以来规模最大的AI专项基金之一。该基金已投资OpenAI和xAI等头部公司，并计划未来每年投入百亿美元。这一事件与Together AI（融资8亿美元）、Twelve Labs（融资1亿美元）等初创公司的成功融资一道，凸显了全球主权财富基金和私人资本正以前所未有的规模涌入AI领域，旨在抢占从芯片到数据中心的战略制高点。", "id": 8, "stocks": [{"displayName": "Nvidia", "name": "NVDA", "note": "作为AI芯片的核心供应商，是巨额资本投入的主要受益者"}, {"displayName": "Equinix", "name": "EQIX", "note": "作为数据中心REIT，受益于算力基础设施的持续扩张"}], "title": "阿布扎比MGX为AI基金成功募资490亿美元"}, {"body": "位于加州的核能初创公司Valar Atomics，近日成功利用其研发的先进反应堆产生的电力，驱动了一枚英伟达Blackwell AI芯片。这是美国首次实现利用下一代核反应堆为AI硬件直接供电，标志着解决AI巨大能耗问题的探索迈出了新的一步。尽管该反应堆尚处早期阶段，但Valar Atomics已与Nvidia(NVDA) 达成合作协议，旨在共同开发由核能驱动的数据中心。这一跨界合作开辟了为未来AI基础设施提供稳定、清洁、高密度能源的新路径。", "id": 9, "stocks": [{"displayName": "Nvidia", "name": "NVDA", "note": "合作有助于解决其客户面临的电力瓶颈"}, {"displayName": "Oklo", "name": "OKLO", "note": "作为已上市的小型核反应堆公司，受益于市场对核能供电数据中心概念的关注度提升"}], "title": "核能初创公司首次利用先进反应堆为AI芯片供电"}, {"body": "根据Edmunds.com的数据，2026年第二季度，美国新车的平均月供攀升至777美元的历史新高，平均贷款总额也达到44,156美元的峰值。超过五分之一的购车者月供超过1000美元，反映出美国汽车市场正面临严重的支付能力危机。这一趋势表明，在高通胀和高车价的双重压力下，美国家庭正通过延长贷款期限和承担更高利息来维持汽车消费，增加了消费者违约风险和长期财务压力。这可能对汽车销售和汽车金融公司的未来业绩构成挑战。", "id": 10, "stocks": [{"displayName": "Carvana", "name": "CVNA", "note": "受益于消费者转向价格更低的二手车市场"}, {"displayName": "AutoZone", "name": "AZO", "note": "车主可能延长旧车使用年限，增加对汽车维修和零部件的需求"}], "title": "美国新车月均还款额升至777美元创历史新高"}, {"body": "法国集装箱航运巨头达飞集团（CMA CGM）已接近达成协议，将以14亿美元现金收购联邦快递（FedEx）旗下的第三方物流业务。这笔交易是达飞集团在物流领域，特别是在美国市场进行扩张的又一重要举措。对于FedEx(FDX) 而言，出售非核心的物流部门有助于其聚焦核心的快递运输业务。这笔交易也反映出全球航运和物流行业在经历了疫情期间的繁荣后，正通过并购重组来优化业务结构和提升竞争力。", "id": 11, "stocks": [{"displayName": "FedEx", "name": "FDX", "note": "通过资产剥离优化业务结构，回笼资金"}], "title": "法国达飞集团将以14亿美元收购联邦快递物流部门"}, {"body": "美国农业部（USDA）宣布将提供5亿美元资金，用于支持新建和扩建美国本土的化肥生产设施。该政策旨在应对近年来因地缘政治、关税和供应链中断导致的化肥价格飙升问题。此举是美国政府保障本国粮食安全和降低农业生产成本系列措施的一部分，优先支持能够立即投产的氮肥项目。这反映出在供应链“武器化”的背景下，确保关键生产资料的本土供应已成为美国的国家战略重点。", "id": 12, "stocks": [{"displayName": "CF Industries", "name": "CF", "note": ""}, {"displayName": "Nutrien", "name": "NTR", "note": "作为北美主要的氮肥生产商，将直接受益于政府的资金支持和行业扶持政策"}], "title": "美国农业部投资5亿美元以加速本土化肥设施建设"}]}]}</script>
<script>

      html += '</div>';

});
ca.innerHTML = html;
})();
