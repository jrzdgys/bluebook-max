    document.title='蓝宝书Max · '+ED.edition.dateDisplay+' '+ED.edition.label;
    document.getElementById('header-date').textContent=ED.edition.dateDisplay;
    document.getElementById('header-edition').textContent='☀️ '+ED.edition.label;
    document.getElementById('stat-topics').textContent=ED.stats.topics;
    document.getElementById('stat-opp').textContent=ED.stats.opportunities;
    document.getElementById('stat-stocks').textContent=ED.stats.stocks;
    document.getElementById('market-summary').textContent='📌 '+ED.marketSummary;
    document.getElementById('topics-header').textContent='🔥 全部主题（'+ED.stats.topics+'个）';
    document.getElementById('update-time').textContent='更新 '+(ED.edition.updateTime||'');
    var C=document.getElementById('topics-container'),OP=null,LC={'龙头首选':'l1','弹性机会':'l2','相关标的':'l3'};
    ED.topics.forEach(function(t,i){var r=i+1,c=ht(t.heat),b=sb(t.heat);var sc=t.scores||{};var gh='';
    t.groups.forEach(function(g){if(!g.items||!g.items.length)return;var lc=LC[g.label]||'l3';
    var rows=g.items.map(function(s){var cd=ED.secidMap[s.name]||'';var cn=cd.replace(/^[01]\./,'');var pd=(s.price!=null)?s.price.toFixed(2):'--';var pctD=(s.pct!=null)?((s.pct>=0?'+':'')+s.pct.toFixed(2)+'%'):'';var pctC=(s.pct!=null)?(s.pct>=0?' up':' dn'):'';
    return'<div class="sr" data-stock="'+s.name+'" data-secid="'+cd+'"><span class="sn">'+s.name+'</span><span class="sc">'+cn+'</span><span class="sp'+pctC+'">'+pd+'</span><span class="spp'+pctC+'">'+pctD+'</span><span class="sr2" title="'+(s.reason||g.label)+'">'+(s.reason||g.label)+'</span></div>'}).join('');
    gh+='<div class="sg"><div class="gl '+lc+'">'+g.label+'</div>'+rows+'</div>'});
    var card=document.createElement('div');card.className='tc';card.innerHTML='<div class="tc-header"><span class="tc-rank">TOP'+r+'</span><span class="tc-name">'+t.topic+'</span><span class="tc-stage" style="background:'+b+';color:'+c+'">'+t.stage+'</span><div class="tc-heat-wrap"><span class="tc-heat" style="color:'+c+'" data-idx="'+i+'">'+t.heat+'</span><span class="tc-info" data-idx="'+i+'">ⓘ</span></div></div><div class="tc-desc">'+t.summary+'</div>'+(t.quote?'<div class="tc-quote">📘 '+t.quote+'</div>':'')+gh;C.appendChild(card)});
    var PE=document.createElement('div');PE.className='hp';PE.id='spu';document.body.appendChild(PE);
    function sp(idx,ae){var t=ED.topics[idx];if(!t)return;var sc=t.scores||{};var ins=sc.inst||Math.round(t.heat*0.55);var mk=sc.market||Math.round(t.heat*0.25);var ct=sc.catalyst||Math.round(t.heat*0.20);PE.innerHTML='<div class="hp-title">'+t.topic+' · 热度构成</div><div class="hp-scores"><div class="hp-line"><span class="hl">机构关注度</span><span class="hv">'+ins+'/60</span></div><div class="hp-line"><span class="hl">市场确认度</span><span class="hv">'+mk+'/25</span></div><div class="hp-line"><span class="hl">催化强度</span><span class="hv">'+ct+'/15</span></div><div class="hp-line" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.15)"><span class="hl">综合热度</span><span class="hv" style="color:'+ht(t.heat)+'">'+t.heat+'/100</span></div></div>';var re=ae.getBoundingClientRect();var pw=280;var x=re.right+10;var y=re.top-20;if(x+pw>window.innerWidth-10){x=re.left-pw-10;PE.classList.add('right')}else{PE.classList.remove('right')}if(y<10)y=10;if(y+120>window.innerHeight)y=window.innerHeight-130;PE.style.left=x+'px';PE.style.top=y+'px';PE.style.display='block';OP=idx}
    function hp(){PE.style.display='none';OP=null}
    document.querySelectorAll('.tc-info,.tc-heat').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var idx=parseInt(this.dataset.idx);if(OP===idx){hp()}else{sp(idx,this)}})});
    document.addEventListener('click',function(e){if(!PE.contains(e.target))hp()});
    window.addEventListener('scroll',function(){if(OP!=null)hp()},{passive:true});
    window.addEventListener('resize',function(){if(OP!=null)hp()},{passive:true});
    var TD=isTH(),RI=TD?15000:60000;
    async function fq(){var as=[],sn={};Object.values(ED.secidMap).forEach(function(s){if(!sn[s]){sn[s]=1;as.push(s)}});if(!as.length)return;try{var u='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f12,f14&secids='+as.join(',')+'&_='+Date.now();var r=await fetch(u);var j=await r.json();if(!j.data||!j.data.diff)return;var pm={};j.data.diff.forEach(function(d){pm[d.f12]={pct:d.f3,price:d.f2}});document.querySelectorAll('.sr[data-secid]').forEach(function(row){var si=row.dataset.secid;var d=pm[si];var spEl=row.querySelector('.sp');var sppEl=row.querySelector('.spp');if(d){if(!isTH()&&d.price&&d.price!==0){spEl.textContent=parseFloat(d.price).toFixed(2)}if(d.pct!=null){var v=parseFloat(d.pct);var cls=v>=0?' up':' dn';spEl.className='sp'+cls;sppEl.className='spp'+cls;sppEl.textContent=(v>=0?'+':'')+v.toFixed(2)+'%'}}});document.getElementById('footer-time').textContent=ts();var d2=document.getElementById('live-dot');var t2=document.getElementById('live-text');if(d2&&t2){if(isTH()){d2.className='live-dot live';t2.textContent='实时行情 · '+ts()}else{d2.className='live-dot closed';t2.textContent='收盘价 · '+ts()}}}catch(e){}}
    fq();setInterval(fq,RI);
    
    </script>
