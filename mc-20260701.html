<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:#0D0D12;color:#E5E5EA;line-height:1.6;padding:20px;min-height:100vh}
/* ===== Float Bar ===== */
.float-bar{position:fixed;top:0;left:0;right:0;z-index:1000;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,13,18,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.float-bar .fb-left{color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.float-bar .fb-left .fb-brand{font-weight:700;color:#fff}
.float-bar .fb-right{display:flex;align-items:center;gap:6px;white-space:nowrap}
#auth-badge{font-size:13px;font-weight:500;color:#34C759;margin-left:auto;white-space:nowrap}
.float-bar .fb-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse-green 2s infinite}
.float-bar .fb-status-dot.green{background:#34C759;box-shadow:0 0 6px rgba(52,199,89,.5)}
@keyframes pulse-green{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
/* ===== Header ===== */
.sh{background:linear-gradient(135deg,#1A1A24 0%,#2C2C3A 50%,#1A1A24 100%);border-radius:16px;padding:24px 28px 20px;margin:48px auto 16px;max-width:900px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.member-notice{padding:6px 28px;font-size:12px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.06);text-align:center;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.member-notice .mn-icon{font-size:11px;opacity:.7}
.member-notice .mn-text{color:rgba(255,255,255,.7)}
.member-notice .mn-dot{color:rgba(255,255,255,.3);font-size:8px}
.member-notice .mn-link{display:inline-flex;align-items:center;gap:4px;padding:2px 12px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:12px;text-decoration:none;white-space:nowrap;cursor:pointer;transition:all .2s}
.member-notice .mn-link:hover{background:rgba(255,255,255,.25)}
.member-notice a{display:inline-block;padding:1px 10px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:12px;text-decoration:none;white-space:nowrap;vertical-align:middle;cursor:pointer}
.member-notice a:hover{background:rgba(255,255,255,.25)}
.sh h1{font-size:28px;font-weight:700;color:#fff;margin:8px 0 4px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.sh h1 .brand-name{color:#fff}
.sh h1 .brand-dot{color:rgba(255,255,255,.4);font-size:24px}
.sh h1 .brand-slogan{font-size:22px;font-weight:400;color:rgba(255,255,255,.65)}
.sh-date{font-size:18px;color:rgba(255,255,255,.8);margin:6px 0 0}
.sh-top{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:8px 0 4px}
.sh-edition{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sh-edition.daily{background:rgba(52,199,89,.18);color:#34C759}
.sh-edition.dynamic{background:rgba(0,122,255,.18);color:#5AC8FA}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:0 28px 14px;font-size:13px;color:rgba(255,255,255,.78)}
.info-row .info-right{color:rgba(255,255,255,.78)}
.info-row .info-left{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap}
.biz-wx{cursor:pointer;color:#fff;font-weight:700;font-size:14px;padding:2px 10px;border-radius:14px;background:rgba(255,255,255,.13);transition:all .2s;user-select:none;display:inline-flex;align-items:center;gap:3px}
.biz-wx:hover{background:rgba(255,255,255,.22)}
.biz-copy-ok{font-size:11px;color:#34C759;opacity:0;transition:opacity .3s;display:inline-block;white-space:nowrap}
.biz-copy-ok.show{opacity:1}
/* ===== Stats Row ===== */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 28px 16px}
.stats-row .st{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 8px;text-align:center;min-width:0}
.stats-row .st strong{display:block;font-size:24px;font-weight:700;color:#fff;line-height:1.2}
.stats-row .st span{display:block;font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;letter-spacing:.3px}
/* ===== Content ===== */
.ct{max-width:900px;margin:0 auto 16px;background:rgba(255,255,255,.03);border-radius:12px;padding:16px 20px 22px}
.ct-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}
/* ===== Topic Card ===== */
.tc{border-radius:12px;padding:16px 16px 16px;margin-bottom:12px;position:relative;transition:all .15s}
.tc > :first-child{margin-top:0}
/* left accent bar */
.tc::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:2px}
.tc.tc-ht{background:rgba(255,255,255,.04);border:none}
.tc.tc-ht .tc-quote{background:rgba(255,255,255,.03);border-left:2px solid rgba(255,255,255,.1)}
.tc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:nowrap}
.tc-name{font-size:15px;font-weight:700;color:#fff;line-height:1.3;flex:1;min-width:0;word-break:break-word}
.tc-name .tc-heat{display:inline-flex;align-items:center;margin-left:6px;cursor:pointer;font-size:13px;vertical-align:middle;position:relative}
.tc-name .tc-heat .heat-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.1);font-size:10px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.tc-name .tc-heat .heat-icon:hover{background:rgba(255,255,255,.2);color:#fff}
.tc-head-right{display:flex;align-items:center;gap:6px;flex-shrink:0;white-space:nowrap}
.tc-stage{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.3px;white-space:nowrap}
.tc-stage.s1{background:rgba(255,215,0,.15);color:#FFD700}
.tc-stage.s2{background:rgba(255,149,0,.15);color:#FF9500}
.tc-stage.s3{background:rgba(0,122,255,.15);color:#5AC8FA}
.tc-quote{font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;padding:10px 12px;border-radius:8px;margin-bottom:8px;background:rgba(255,255,255,.03);white-space:pre-wrap;word-break:break-word}
/* ===== Stock Row (horizontal within topic) ===== */
.sr{display:flex;align-items:center;padding:6px 8px;margin-bottom:3px;border-radius:8px;gap:6px;flex-wrap:wrap;background:rgba(255,255,255,.02);transition:background .15s}
.sr:hover{background:rgba(255,255,255,.05)}
.sr .sn{font-weight:600;font-size:13px;color:#fff;min-width:52px;white-space:nowrap}
.sr .sc{font-size:10px;color:rgba(255,255,255,.4);margin-left:-2px;white-space:nowrap}
.sr .sp{font-size:12px;font-weight:600;min-width:48px;text-align:right;white-space:nowrap}
.sr .spp{font-size:12px;font-weight:600;min-width:48px;text-align:right;white-space:nowrap}
.sr .spp.red{color:#FF3B30}
.sr .spp.green{color:#34C759}
.sr .sr2{flex:1;min-width:80px;font-size:11px;color:rgba(255,255,255,.55);white-space:normal;word-break:break-word;overflow-wrap:break-word;line-height:1.4}
/* non-A stock */
.sr .sr-non-a{flex:1;font-size:11px;color:rgba(255,255,255,.55);white-space:normal;word-break:break-word;overflow-wrap:break-word;line-height:1.4;margin-top:2px}
/* ===== Cross Stock Section ===== */
.cross-section{margin-bottom:16px}
.cross-section .ct-title{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.cross-section .ct-title .cross-sub{font-size:12px;font-weight:400;color:rgba(255,255,255,.4)}
.cross-section .rs-row{display:flex;align-items:center;padding:8px 10px;margin-bottom:4px;border-radius:8px;gap:6px;flex-wrap:wrap;background:rgba(255,255,255,.02)}
.cross-section .rs-row .rs-sn{font-weight:600;font-size:13px;color:#fff;min-width:52px;white-space:nowrap}
.cross-section .rs-row .rs-sc{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}
.cross-section .rs-row .rs-sp{font-size:12px;font-weight:600;min-width:48px;text-align:right;white-space:nowrap}
.cross-section .rs-row .rs-spp{font-size:12px;font-weight:600;min-width:48px;text-align:right;white-space:nowrap}
.cross-section .rs-row .rs-spp.red{color:#FF3B30}
.cross-section .rs-row .rs-spp.green{color:#34C759}
.cross-section .rs-row .rs-occs{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:60px}
.cross-section .rs-row .rs-occs .occ-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);white-space:nowrap}
/* ===== Score Popup ===== */
.hp{position:fixed;z-index:2000;background:#2C2C3A;border-radius:14px;padding:18px 20px;box-shadow:0 8px 40px rgba(0,0,0,.5);max-width:340px;width:280px;display:none;border:1px solid rgba(255,255,255,.06)}
.hp.show{display:block}
.hp .hp-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:8px;text-align:center}
.hp .hp-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.hp .hp-row:last-child{border-bottom:none}
.hp .hp-label{color:rgba(255,255,255,.55)}
.hp .hp-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin:0 8px;overflow:hidden}
.hp .hp-bar{height:100%;border-radius:3px;transition:width .3s}
.hp .hp-val{font-weight:600;color:#fff;min-width:24px;text-align:right}
.hp .hp-close{text-align:center;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.hp .hp-close button{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:11px;padding:4px 16px;border-radius:12px;cursor:pointer;transition:all .15s}
.hp .hp-close button:hover{background:rgba(255,255,255,.2)}
/* ===== Opportunities Section ===== */
.opp-section{margin-bottom:16px}
.opp-section .ct-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}
/* ===== Focus section ===== */
.focus-section{margin-bottom:16px}
.focus-section .ct-title{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.focus-toggle{font-size:11px;color:rgba(255,255,255,.4);cursor:pointer;transition:color .15s;background:none;border:none;font-family:inherit}
.focus-toggle:hover{color:rgba(255,255,255,.7)}
/* ===== Export ===== */
.export-wrap{position:relative;display:inline-block;margin-top:10px}
.export-btn-st{cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);padding:8px 14px;border-radius:10px;transition:background .15s;border:none;color:#fff;font-family:inherit}
.export-btn-st:hover{background:rgba(255,255,255,.15)}
.export-btn-st svg{width:14px;height:14px;fill:currentColor}
.export-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:#1C1C28;border-radius:10px;padding:4px;box-shadow:0 4px 20px rgba(0,0,0,.4);min-width:160px;z-index:100}
.export-dropdown.show{display:block}
.export-dropdown .ed-item{padding:8px 12px;font-size:12px;color:rgba(255,255,255,.8);cursor:pointer;transition:background .15s;border-radius:8px;text-decoration:none;display:flex;align-items:center;gap:6px}
.export-dropdown .ed-item:hover{background:rgba(255,255,255,.08);color:#fff}
/* ===== Footer ===== */
.fo{max-width:900px;margin:20px auto;padding:18px 20px;border-radius:12px;background:rgba(255,255,255,.02);text-align:center}
.fo .fo-line1{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px;letter-spacing:.2px}
.fo .fo-line2{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:10px}
.fo .fo-line3{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.fo .fo-line3 a{color:#0071E3;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:rgba(0,113,227,.06);transition:all .15s}
.fo .fo-line3 a:hover{background:rgba(0,113,227,.12);color:#005BB5}
.fo .fo-email{color:#AEAEB2}
/* ===== Mobile ===== */
@media(max-width:640px){body{padding:12px}.sh{padding:16px 14px 14px}.sh h1{font-size:22px;flex-wrap:nowrap;gap:6px}.sh h1 .brand-slogan{font-size:18px}.sh-date{font-size:16px}.sh-edition{font-size:11px;padding:3px 10px}.sh-top{gap:6px}.ct{padding:12px 12px 18px}.tc{padding:14px 12px}.tc-name{font-size:13px}.tc-quote{font-size:11px;padding:8px 10px}.sr{flex-wrap:wrap;padding:5px 4px;gap:4px}.sr .sn{min-width:auto;font-size:12px}.sr .sc{font-size:9px}.sr .sp{font-size:11px;min-width:auto}.sr .spp{font-size:11px;min-width:auto}.sr .sr2{flex:0 0 100%;width:100%;text-align:left;margin-top:2px;font-size:10px;white-space:normal;word-break:break-all;overflow-wrap:break-word}.sc-body{padding:10px 12px}.hp{max-width:300px;padding:14px 16px;width:88vw}.fo{padding:14px 10px}.fo .fo-line1{font-size:10px}.fo .fo-line2{font-size:9px}.fo .fo-line3{gap:8px;flex-direction:column}.fo .fo-line3 a{padding:6px 14px;font-size:10px;width:100%;justify-content:center}.rs-row{flex-wrap:wrap;gap:4px}.rs-row .rs-sn{min-width:auto;font-size:12px}.rs-row .rs-sc{font-size:9px}.rs-row .rs-sp{font-size:11px;min-width:auto}.rs-row .rs-spp{font-size:11px;min-width:auto}.rs-row .rs-occs{min-width:auto;width:100%;margin-top:2px;flex-direction:row;flex-wrap:wrap}.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stats-row .st{min-width:auto;padding:8px 6px;border-radius:8px}.stats-row .st strong{font-size:20px}.stats-row .st span{font-size:10px}.float-bar{height:36px;padding:0 12px}.float-bar .fb-left{font-size:12px}.float-bar .fb-right{font-size:11px}.member-notice{padding:5px 14px;font-size:12px;gap:4px}.member-notice .mn-link{font-size:11px;padding:1px 10px}.info-row{padding:0 14px 10px;flex-wrap:wrap;gap:2px;font-size:12px;color:rgba(255,255,255,.78)}.info-row .info-left{gap:3px}.info-row .info-right{flex:0 0 100%;margin-left:0;text-align:left;font-size:10px;opacity:.6}}
</style>
