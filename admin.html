<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓝宝书Max · 激活码管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1d2e 0%, #2d3561 50%, #1a1d2e 100%);
  color: #1d1d1f;
  min-height: 100vh;
}
.card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,.08); width: 100%; }
.container { width: 100%; max-width: 1100px; margin: 20px auto; padding: 0 16px; }

/* Login - centered icon/title, left-aligned description with padding */
#loginScreen { max-width: 420px; margin: 60px auto; }
#loginScreen .card {
  padding: 40px 36px;
  text-align: center;
  border-radius: 20px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.06); }
  50% { box-shadow: 0 16px 48px rgba(0,0,0,.25), 0 4px 12px rgba(0,0,0,.1); }
}
#loginScreen .login-icon { font-size: 40px; margin-bottom: 16px; }
#loginScreen h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
#loginScreen p {
  color: #86868b; font-size: 13px; margin-bottom: 28px;
  text-align: left; padding: 0 4px;
}
#loginScreen label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; text-align: left; }
#loginScreen input {
  width: 100%; height: 46px;
  border: 1px solid #d2d2d7; border-radius: 12px; padding: 0 16px;
  font-size: 15px; transition: all .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  margin-bottom: 20px;
}
#loginScreen input:focus {
  outline: none; border-color: #0071e3;
  box-shadow: 0 0 0 4px rgba(0,113,227,.12), 0 2px 6px rgba(0,0,0,.06);
}
#loginScreen .btn {
  width: 100%; height: 46px; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: linear-gradient(135deg, #0071e3, #005fc4);
  color: #fff; transition: all .2s;
  box-shadow: 0 4px 14px rgba(0,113,227,.3);
  text-align: center;
}
#loginScreen .btn:hover {
  opacity: .92;
  box-shadow: 0 6px 20px rgba(0,113,227,.4);
  transform: translateY(-1px);
}
#loginScreen .btn:active { transform: translateY(0); }
#loginScreen .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
#loginScreen .error { color: #ff3b30; font-size: 13px; margin-top: 10px; display: none; text-align: center; }
#loginScreen .hint { color: #86868b; font-size: 12px; margin-top: 20px; text-align: center; }
#loginScreen .hint a { color: #0071e3; text-decoration: none; }

#adminScreen { display: none; }
#adminScreen .card { background: #fff; }
.header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
.header-bar h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.header-bar .user { font-size: 13px; color: #6e6e73; }
.header-bar .logout { font-size: 13px; color: #0071e3; cursor: pointer; text-decoration: none; margin-left: 12px; }
.header-bar .logout:hover { text-decoration: underline; }

#statsBar { display: none; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 100px; background: #f5f5f7; border-radius: 12px; padding: 14px 16px; text-align: center; }
.stat-card .num { font-size: 26px; font-weight: 700; }
.stat-card .label { font-size: 11px; color: #86868b; margin-top: 2px; }
.stat-card.used { background: #e8f5e9; }
.stat-card.used .num { color: #2e7d32; }
.stat-card.unused { background: #e3f2fd; }
.stat-card.unused .num { color: #1565c0; }
.stat-card.expired { background: #fce4ec; }
.stat-card.expired .num { color: #c62828; }

.toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.toolbar input, .toolbar select { height: 36px; border: 1px solid #d2d2d7; border-radius: 8px; padding: 0 12px; font-size: 13px; outline: none; }
.toolbar input:focus, .toolbar select:focus { border-color: #0071e3; }

.btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 4px; }
.btn-primary { background: #0071e3; color: #fff; }
.btn-primary:hover { background: #0066d6; }
.btn-outline { background: transparent; border: 1px solid #d2d2d7; color: #1d1d1f; }
.btn-outline:hover { background: #f5f5f7; border-color: #bbb; }
.btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
.btn-xs { padding: 2px 8px; font-size: 11px; border-radius: 5px; height: 24px; }
.btn-icon { width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; }

#generateCard { display: none; background: #f5f5f7; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
#generateCard .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
#generateCard input[type="number"] { width: 70px; }
#generateCard .hint { color: #86868b; font-size: 12px; margin-top: 8px; }

.search-box { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.search-box input { flex: 1; min-width: 160px; height: 36px; border: 1px solid #d2d2d7; border-radius: 8px; padding: 0 12px; font-size: 13px; outline: none; }
.search-box input:focus { border-color: #0071e3; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
thead th { background: #f5f5f7; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; color: #555; cursor: pointer; user-select: none; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
thead th:hover { background: #e8e8ed; }
thead th .sort-icon { color: #bbb; margin-left: 3px; font-size: 11px; }
thead th.active { color: #0071e3; }
thead th.active .sort-icon { color: #0071e3; }
tbody tr { border-bottom: 1px solid #eee; }
tbody tr:hover { background: #fafafa; }
tbody td { padding: 10px 12px; vertical-align: middle; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-green { background: #e8f5e9; color: #2e7d32; }
.badge-gray { background: #f0f0f0; color: #666; }
.badge-red { background: #fce4ec; color: #c62828; }

.code-cell { font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
.code-cell .code-text { font-weight: 500; }
.copy-btn { cursor: pointer; color: #8e8e93; font-size: 14px; transition: color .15s; background: none; border: none; padding: 2px 4px; border-radius: 4px; }
.copy-btn:hover { color: #0071e3; background: #e8f0fe; }
.copy-btn.copied { color: #34c759; }

.action-btns { display: flex; gap: 6px; align-items: center; }
.btn-danger { color: #ff3b30; background: transparent; border: none; }
.btn-danger:hover { background: #fff0ef; }
.btn-unbind { color: #555; background: transparent; border: 1px solid #d2d2d7; }
.btn-unbind:hover { background: #f5f5f7; border-color: #bbb; }

.pagination { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 16px; padding: 8px 0; }
.page-btn { min-width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid transparent; color: #555; background: transparent; }
.page-btn:hover { background: #f0f0f0; }
.page-btn.active { background: #0071e3; color: #fff; font-weight: 600; }
.page-btn.disabled { opacity: .3; cursor: default; pointer-events: none; }
.page-info { font-size: 12px; color: #86868b; margin: 0 8px; }

#msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
#msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
#msg.error { display: block; background: #fce4ec; color: #c62828; }
#loading { text-align: center; padding: 40px; color: #86868b; font-size: 14px; }
.codes-output { display: none; background: #fff; border: 1px solid #d2d2d7; border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 12px; line-height: 1.8; }

@media (max-width: 768px) {
  .container { margin: 10px auto; }
  .card { padding: 16px; }
  #loginScreen { margin: 30px auto; }
  #loginScreen .card { padding: 24px 20px; }
  .stat-card { min-width: calc(50% - 6px); }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { flex-direction: column; }
  .search-box input { min-width: auto; }
  thead th, tbody td { padding: 8px 6px; font-size: 11px; }
}
@media (max-width: 480px) {
  .stat-card .num { font-size: 20px; }
  table { font-size: 11px; }
  thead th, tbody td { padding: 6px 4px; }
  .code-cell { font-size: 10px; letter-spacing: 0; }
}
</style>
</head>
<body>

<div id="loginScreen" class="container">
  <div class="card">
    <div class="login-icon">🔑</div>
    <h1>管理员登录</h1>
    <p>请使用管理员密钥登录以管理激活码</p>
    <label for="loginKey">管理员密钥</label>
    <input type="password" id="loginKey" placeholder="输入管理员密钥" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="loginBtn" onclick="doLogin()">登录</button>
    <div class="error" id="loginError"></div>
    <div class="hint">🌐 密钥在 <a href="https://dash.cloudflare.com/bfbe5adb75860529c469ce5316dd0072/workers/services/view/bluebook-auth/production/settings/variables" target="_blank">Cloudflare 环境变量</a></div>
  </div>
</div>

<div id="adminScreen" class="container">
  <div class="card" style="padding:20px 24px">
    <div class="header-bar">
      <h1>🔑 蓝宝书Max · 激活码管理</h1>
      <div>
        <span class="user" id="adminBadge"></span>
        <a class="logout" onclick="doLogout()">退出</a>
      </div>
    </div>

    <div id="statsBar">
      <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">总计</div></div>
      <div class="stat-card used"><div class="num" id="stat-used">-</div><div class="label">已使用</div></div>
      <div class="stat-card unused"><div class="num" id="stat-unused">-</div><div class="label">未使用</div></div>
      <div class="stat-card expired"><div class="num" id="stat-expired">-</div><div class="label">已过期</div></div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary btn-sm" onclick="showGenerate()">➕ 生成新码</button>
      <button class="btn btn-outline btn-sm" onclick="exportUnused()">📋 导出未使用</button>
    </div>

    <div id="generateCard">
      <div class="row">
        <span>生成</span>
        <input type="number" id="newCount" value="5" min="1" max="50">
        <span>个，有效期</span>
        <input type="number" id="newDays" value="365" min="1" max="3650">
        <span>天</span>
        <button class="btn btn-primary btn-sm" onclick="generateCodes()">确认</button>
        <button class="btn btn-outline btn-sm" onclick="hideGenerate()">取消</button>
      </div>
      <div class="hint">💡 新格式：BBM-8位字母数字（例：BBM-A3X7K9P2）</div>
      <div id="codesOutput" class="codes-output"></div>
    </div>

    <div id="msg"></div>
    <div id="loading">⏳ 加载中...</div>

    <div id="tableWrap">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索激活码..." oninput="filterCodes()">
        <select id="statusFilter" onchange="filterCodes()">
          <option value="all">全部状态</option>
          <option value="unused">未使用</option>
          <option value="used">已使用</option>
          <option value="expired">已过期</option>
        </select>
        <span class="page-info">共 <span id="totalCount">0</span> 个，显示 <span id="shownCount">0</span> 个</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('code')" id="th-code">激活码 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('status')" id="th-status">状态 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('devices')" id="th-devices">设备 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('expiresAt')" id="th-expires">有效期至 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('createdAt')" id="th-created">创建于 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('lastAccess')" id="th-last">最近活跃 <span class="sort-icon">↕</span></th>
              <th style="cursor:default">操作</th>
            </tr>
          </thead>
          <tbody id="codeTable"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<script>
var WORKER = 'https://bluebook-auth.bluebookmax.workers.dev';
var KEY_KEY = 'bbm_admin_key';
var PAGE_SIZE = 20;
var allCodes = [], filteredCodes = [], sortField = null, sortAsc = true, searchQuery = '', currentPage = 1;

function api(ep, body) {
  var key = localStorage.getItem(KEY_KEY) || '';
  return fetch(WORKER + ep, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(Object.assign({}, body, {admin_key:key})) }).then(function(r){return r.json();});
}

function doLogin() {
  var key = document.getElementById('loginKey').value.trim();
  if (!key) return;
  var btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '验证中...';
  document.getElementById('loginError').style.display = 'none';
  fetch(WORKER + '/list', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({admin_key:key}) })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.ok) {
      localStorage.setItem(KEY_KEY, key);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      document.getElementById('adminBadge').textContent = '已登录';
      loadCodes();
    } else { showLoginError(data.error || '密钥错误'); }
  })
  .catch(function(e){ showLoginError('网络错误: ' + e.message); });
}

function showLoginError(m) {
  var el = document.getElementById('loginError');
  el.textContent = '❌ ' + m; el.style.display = 'block';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = '登录';
}

function doLogout() {
  localStorage.removeItem(KEY_KEY);
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('loginKey').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = '登录';
}

async function loadCodes() {
  clearMsg();
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tableWrap').style.display = 'none';
  var data = await api('/list', {});
  document.getElementById('loading').style.display = 'none';
  if (!data.ok) { msg('❌ ' + (data.error||'加载失败'), 'error'); return; }
  allCodes = data.codes || [];
  document.getElementById('totalCount').textContent = allCodes.length;
  var now = new Date(), used = 0, expired = 0;
  allCodes.forEach(function(c){
    if (c.expiresAt && new Date(c.expiresAt) < now) expired++;
    else if (c.devices > 0) used++;
  });
  document.getElementById('stat-total').textContent = allCodes.length;
  document.getElementById('stat-used').textContent = used;
  document.getElementById('stat-unused').textContent = allCodes.length - used - expired;
  document.getElementById('stat-expired').textContent = expired;
  document.getElementById('statsBar').style.display = 'flex';
  sortField = null; sortAsc = true; currentPage = 1;
  document.querySelectorAll('th').forEach(function(th){
    th.classList.remove('active');
    var ic = th.querySelector('.sort-icon');
    if (ic) ic.textContent = '\u2195';
  });
  document.getElementById('tableWrap').style.display = 'block';
  renderTable();
}

function sortBy(field) {
  if (sortField === field) {
    if (sortAsc === true) sortAsc = false;
    else { sortField = null; sortAsc = true; }
  } else { sortField = field; sortAsc = true; }
  document.querySelectorAll('th').forEach(function(t){t.classList.remove('active');});
  var m = {code:'th-code',status:'th-status',devices:'th-devices',expiresAt:'th-expires',createdAt:'th-created',lastAccess:'th-last'};
  var at = document.getElementById(m[field]);
  if (at) {
    if (sortField === null) {
      at.classList.remove('active');
      var ic = at.querySelector('.sort-icon');
      if (ic) ic.textContent = '\u2195';
    } else {
      at.classList.add('active');
      var ic2 = at.querySelector('.sort-icon');
      if (ic2) ic2.textContent = sortAsc ? '\u2191' : '\u2193';
    }
  }
  currentPage = 1; renderTable();
}

function filterCodes() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  currentPage = 1; renderTable();
}

function renderTable() {
  var sv = document.getElementById('statusFilter').value;
  var now = new Date();
  filteredCodes = allCodes.filter(function(c){
    if (searchQuery && c.code.toLowerCase().indexOf(searchQuery) === -1) return false;
    if (sv !== 'all') {
      var ex = c.expiresAt && new Date(c.expiresAt) < now;
      var us = !ex && c.devices > 0;
      if (sv==='unused' && (us||ex)) return false;
      if (sv==='used' && !us) return false;
      if (sv==='expired' && !ex) return false;
    }
    return true;
  });
  if (sortField) {
    filteredCodes = filteredCodes.slice().sort(function(a,b){
      var va,vb;
      switch(sortField){
        case 'code': va=a.code; vb=b.code; break;
        case 'status': va=getStatusOrder(a); vb=getStatusOrder(b); break;
        case 'devices': va=a.devices; vb=b.devices; break;
        case 'expiresAt': va=a.expiresAt||''; vb=b.expiresAt||''; break;
        case 'createdAt': va=a.createdAt||''; vb=b.createdAt||''; break;
        case 'lastAccess': va=a.lastAccess||0; vb=b.lastAccess||0; break;
        default: va=a.code; vb=b.code;
      }
      if(va<vb) return sortAsc?-1:1;
      if(va>vb) return sortAsc?1:-1;
      return 0;
    });
  }
  document.getElementById('shownCount').textContent = filteredCodes.length;
  var tp = Math.max(1, Math.ceil(filteredCodes.length / PAGE_SIZE));
  if (currentPage > tp) currentPage = tp;
  var st = (currentPage - 1) * PAGE_SIZE;
  var pc = filteredCodes.slice(st, st + PAGE_SIZE);
  var tb = document.getElementById('codeTable');
  tb.innerHTML = pc.map(function(c){
    var ex = c.expiresAt && new Date(c.expiresAt) < now;
    var us = !ex && c.devices > 0;
    var sts = ex ? '<span class="badge badge-red">已过期</span>' : us ? '<span class="badge badge-green">已使用</span>' : '<span class="badge badge-gray">未使用</span>';
    var dt = c.devices > 0 ? '已绑定 ' + c.devices + ' 台' : '-';
    return '<tr><td><div class="code-cell"><span class="code-text">' + escHtml(c.code) + '</span><button class="copy-btn" onclick="copyCode(' + "'" + escJsStr(c.code) + "'" + ',this)" title="复制">📋</button></div></td><td>' + sts + '</td><td>' + dt + '</td><td>' + formatDate(c.expiresAt) + '</td><td>' + formatDate(c.createdAt) + '</td><td>' + timeAgo(c.lastAccess||c.boundAt) + '</td><td><div class="action-btns">' + (c.devices>0?'<button class="btn btn-unbind btn-xs" onclick="unbindAll(' + "'" + escJsStr(c.code) + "'" + ')">🔓 解绑</button>':'<span style="color:#ccc">-</span>') + '<button class="btn btn-danger btn-xs" onclick="deleteCode(' + "'" + escJsStr(c.code) + "'" + ')">🗑️ 删除</button></div></td></tr>';
  }).join('');
  renderPagination(tp);
}

function renderPagination(tp) {
  var el = document.getElementById('pagination');
  if (tp <= 1) { el.innerHTML = ''; return; }
  var h = '<button class="page-btn' + (currentPage<=1?' disabled':'') + '" onclick="goToPage('+(currentPage-1)+')"' + (currentPage<=1?' disabled':'') + '>‹</button>';
  var sp = Math.max(1, currentPage-2), ep = Math.min(tp, currentPage+2);
  if (sp>1) h += '<button class="page-btn" onclick="goToPage(1)">1</button>';
  if (sp>2) h += '<span class="page-info">…</span>';
  for (var i=sp; i<=ep; i++) h += '<button class="page-btn' + (i===currentPage?' active':'') + '" onclick="goToPage('+i+'">'+i+'</button>';
  if (ep<tp-1) h += '<span class="page-info">…</span>';
  if (ep<tp) h += '<button class="page-btn" onclick="goToPage('+tp+'">'+tp+'</button>';
  h += '<button class="page-btn' + (currentPage>=tp?' disabled':'') + '" onclick="goToPage('+(currentPage+1)+')"' + (currentPage>=tp?' disabled':'') + '>›</button>';
  h += '<span class="page-info">第 ' + currentPage + '/' + tp + ' 页</span>';
  el.innerHTML = h;
}

function goToPage(n) {
  var tp = Math.max(1, Math.ceil(filteredCodes.length / PAGE_SIZE));
  if (n<1||n>tp) return;
  currentPage = n; renderTable();
}

function escHtml(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escJsStr(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function getStatusOrder(c) { var n=new Date(); if(c.expiresAt&&new Date(c.expiresAt)<n) return 2; if(c.devices>0) return 1; return 0; }
function formatDate(d) { if(!d) return '-'; try{return new Date(d).toISOString().slice(0,10);}catch(e){return '-';} }

function timeAgo(ts) {
  if (!ts) return '-';
  try {
    var t = new Date(ts).getTime();
    if (isNaN(t)) return '-';
    var diff = Date.now() - t;
    if (diff < 0) return '刚刚';
    var mins = Math.floor(diff/60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return mins + '分钟前';
    var hrs = Math.floor(mins/60);
    if (hrs < 24) return hrs + '小时前';
    var days = Math.floor(hrs/24);
    if (days < 7) return days + '天前';
    var dt = new Date(t);
    var mm = (dt.getMonth()+1).toString().padStart(2,'0');
    var dd = dt.getDate().toString().padStart(2,'0');
    var hh = dt.getHours().toString().padStart(2,'0');
    var mn = dt.getMinutes().toString().padStart(2,'0');
    return mm+'/'+dd+' '+hh+':'+mn;
  } catch(e){return '-';}
}

async function unbindAll(code) {
  if (!confirm('确定解绑 ' + code + ' 的所有设备？\n解绑后该码将恢复为"未使用"状态。')) return;
  var data = await api('/unbind', {code:code});
  if (data.ok) { msg('✅ 解绑成功！剩余设备位: '+data.devicesLeft, 'success'); loadCodes(); }
  else { msg('❌ '+(data.error||'解绑失败'), 'error'); }
}

async function deleteCode(code) {
  if (!confirm('⚠️ 确定要永久删除激活码 ' + code + ' 吗？\n此操作不可撤销！')) return;
  var data = await api('/codes/delete', {code:code});
  if (data.ok) { msg('✅ '+(data.message||'删除成功'), 'success'); loadCodes(); }
  else { msg('❌ '+(data.error||'删除失败'), 'error'); }
}

async function generateCodes() {
  var count = parseInt(document.getElementById('newCount').value)||5;
  var days = parseInt(document.getElementById('newDays').value)||365;
  var codes = [], seen = {};
  while (codes.length < count) {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var code = 'BBM-';
    for (var j=0;j<8;j++) code += chars.charAt(Math.floor(Math.random()*chars.length));
    if (seen[code]) continue;
    seen[code] = true; codes.push(code);
  }
  var data = await api('/codes/create', {codes:codes, days:days});
  if (data.ok) {
    var es = data.expiresAt ? new Date(data.expiresAt).toISOString().slice(0,10) : '-';
    var html = '✅ 成功生成 ' + data.created + ' 个激活码（跳过 ' + (data.total-data.created) + ' 个重复）<br>有效期至: ' + es + '<br><br>';
    for (var i=0;i<codes.length;i++) html += '  '+(i+1)+'. <strong>'+codes[i]+'</strong><br>';
    document.getElementById('codesOutput').innerHTML = html;
    document.getElementById('codesOutput').style.display = 'block';
    msg('✅ 已生成 '+data.created+' 个激活码！', 'success');
    loadCodes();
  } else { msg('❌ '+(data.error||'生成失败'), 'error'); }
}

function showGenerate() { document.getElementById('generateCard').style.display='block'; document.getElementById('codesOutput').style.display='none'; }
function hideGenerate() { document.getElementById('generateCard').style.display='none'; }

function exportUnused() {
  var codes = [], now = new Date();
  allCodes.forEach(function(c){
    var ex = c.expiresAt && new Date(c.expiresAt) < now;
    if (!ex && c.devices === 0) codes.push(c.code);
  });
  if (codes.length===0) { msg('没有未使用的激活码', 'error'); return; }
  copyText(codes.join('\n'), '✅ 已复制 '+codes.length+' 个未使用激活码到剪贴板');
}

function copyCode(code, btn) {
  copyText(code, '✅ 已复制：'+code);
  btn.textContent = '✅'; btn.classList.add('copied');
  setTimeout(function(){btn.textContent='📋';btn.classList.remove('copied');},2000);
}

function copyText(text, successMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){msg(successMsg,'success');}).catch(function(){fallbackCopy(text,successMsg);});
  } else { fallbackCopy(text,successMsg); }
}

function fallbackCopy(text, successMsg) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); msg(successMsg,'success'); } catch(e) { prompt('复制以下内容：',text); }
  document.body.removeChild(ta);
}

function msg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text; el.className = type||'';
  el.style.display='block'; clearTimeout(el._timer);
  el._timer=setTimeout(function(){el.style.display='none';},4000);
}
function clearMsg() { var el=document.getElementById('msg'); el.style.display='none'; el.textContent=''; }

(function(){
  var key = localStorage.getItem(KEY_KEY)||'';
  if (key) {
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    document.getElementById('adminBadge').textContent='已登录';
    loadCodes();
  }
})();
