name: 蓝宝书Max 自动报告

on:
  schedule:
    - cron: '23 0 * * 1-5'
    - cron: '4 4 * * 1-5'
    - cron: '12 12 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # ===== Job 1: 生成报告（仅 schedule / workflow_dispatch）=====
  generate-reports:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: 安装依赖
        run: pip install requests
      - name: 生成所有报告
        continue-on-error: true
        run: python3 generate_all_reports.py || true
      - name: 更新导航清单
        run: python3 update_manifest.py || true
      - name: 提交数据更新
        run: |
          git config user.name "BluebookMax Bot"
          git config user.email "bot@bluebook.max"
          git add manifest.json *.html data-*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: $(date -u +'%Y-%m-%d %H:%M') 报告更新"
          git push

  # ===== Job 2: 部署到 Pages（所有事件）=====
  deploy-pages:
    needs: generate-reports
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 配置 Pages
        uses: actions/configure-pages@v4
      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
