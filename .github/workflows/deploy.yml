name: 蓝宝书Max 自动报告

on:
  schedule:
    # 北京时间 07:00 / 12:00 / 20:00 (工作日)
    - cron: '23 0 * * 1-5'   # UTC 00:23 ≈ 北京 08:23 (给点缓冲)
    - cron: '4 4 * * 1-5'    # UTC 04:04 ≈ 北京 12:04
    - cron: '12 12 * * 1-5'  # UTC 12:12 ≈ 北京 20:12
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

jobs:
  generate-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install requests

      - name: 生成所有报告
        run: python3 generate_all_reports.py

      - name: 更新导航清单
        run: python3 update_manifest.py

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 提交数据更新
        run: |
          git config user.name "BluebookMax Bot"
          git config user.email "bot@bluebook.max"
          git add manifest.json *.html data-*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: $(date -u +'%Y-%m-%d %H:%M') 报告更新 · 蓝宝书Max v2"
          git push
