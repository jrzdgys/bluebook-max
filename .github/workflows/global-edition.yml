name: 🌍 全球版 Auto-Generator
on:
  schedule:
    - cron: "0 0 * * *"  # 8:00 CST = 0:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run generator
        run: python generate_report.py --edition gl
      - name: Deploy
        run: |
          git config user.email "ally@allyhub.ai"
          git config user.name "Ally Bot"
          TODAY=$(TZ='Asia/Shanghai' date +%Y%m%d)
          GL_FILE="gl-${TODAY}.html"
          if [ -f "$GL_FILE" ]; then
            git add "$GL_FILE"
            git commit -m "🌍 全球版 ${TODAY}"
            git push origin main
          else
            echo "No file $GL_FILE generated - skipping push"
            exit 1
          fi
