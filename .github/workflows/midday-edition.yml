name: ☀️ 午间版 Auto-Generator
on:
  schedule:
    - cron: "0 4 * * *"  # 12:00 CST = 4:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run generator
        run: python generate_report.py --edition md
      - name: Deploy
        run: |
          git config user.email "ally@allyhub.ai"
          git config user.name "Ally Bot"
          TODAY=$(TZ='Asia/Shanghai' date +%Y%m%d)
          MD_FILE="md-${TODAY}.html"
          if [ -f "$MD_FILE" ]; then
            git add "$MD_FILE"
            git commit -m "☀️ 午间版 ${TODAY}"
            git push origin main
          else
            echo "No file $MD_FILE generated - skipping push"
            exit 1
          fi
