name: 🌙 晚间版 Auto-Generator
on:
  schedule:
    - cron: "0 12 * * *"  # 20:00 CST = 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run generator
        run: python generate_report.py --edition pm
      - name: Deploy
        run: |
          git config user.email "ally@allyhub.ai"
          git config user.name "Ally Bot"
          TODAY=$(TZ='Asia/Shanghai' date +%Y%m%d)
          PM_FILE="pm-${TODAY}.html"
          if [ -f "$PM_FILE" ]; then
            git add "$PM_FILE"
            git commit -m "🌙 晚间版 ${TODAY}"
            git push origin main
          else
            echo "No file $PM_FILE generated - skipping push"
            exit 1
          fi
