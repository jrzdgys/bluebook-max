<script>
(function(){
var g = GD;
if(!g) return;

// Edition
var ei = "🌍", ec = "#30B46E", ebg = "rgba(48,180,110,.15)";
document.getElementById("header-date").textContent = g.edition.dateDisplay + " " + g.edition.weekday;
var he = document.getElementById("header-edition");
he.textContent = ei + " " + g.edition.label;
he.style.background = ebg;
he.style.color = ec;

document.getElementById("update-time").textContent = "更新于 · " + g.edition.updateTime;
document.getElementById("stat-news").textContent = g.stats.newsCount;
document.getElementById("stat-stocks").textContent = g.stats.stockCount;
document.getElementById("stat-sections").textContent = g.stats.sectionCount;

document.title = "蓝宝书Max · " + g.edition.dateDisplay + " " + g.edition.weekday + " " + g.edition.label;
document.querySelector('meta[property="og:title"]').setAttribute("content", document.title);
document.querySelector('meta[property="og:description"]').setAttribute("content", g.stats.newsCount + "条全球新闻 · " + g.stats.stockCount + "只相关标的");

var liveDot = document.getElementById("live-dot");
var liveText = document.getElementById("live-text");
liveDot.className = "live-dot after-hours";
liveText.textContent = "已更新 · " + g.edition.updateTime.split(" ")[1];

// Render sections
var ca = document.getElementById("content-area");
var html = "";
g.sections.forEach(function(s, si){
  html += '<div class="sc">';
  html += '<div class="sc-hd"><span class="sc-icon">' + (s.icon || "") + '</span><span class="sc-title">' + s.name + '</span><span class="sc-sub">' + s.news.length + '条</span></div>';
  html += '<div class="sc-body">';
  s.news.forEach(function(n){
    html += '<div class="news-card">';
    html += '<div class="news-num">#' + n.id + '</div>';
    html += '<div class="news-title">' + n.title + '</div>';
    html += '<div class="news-body">' + n.body + '</div>';
    if(n.stocks && n.stocks.length > 0){
      html += '<div class="stock-tags">';
      n.stocks.forEach(function(st){
        html += '<span class="stock-tag">' + st.name + '<span class="note">' + st.note + '</span></span>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';
});
ca.innerHTML = html;

// OG meta
document.querySelector('meta[property="og:title"]').setAttribute("content", document.title);
document.querySelector('meta[property="og:description"]').setAttribute("content", g.stats.newsCount + "条全球新闻 · " + g.stats.stockCount + "只相关标的");
})();
</script>
</body>
</html>
